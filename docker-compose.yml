services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: file:../data/dev.db
    volumes:
      - ./data:/app/data

